services:
  postgres:
    image: postgres:16-alpine
    container_name: crezo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crezo
      POSTGRES_PASSWORD: crezo
      POSTGRES_DB: crezo
    ports:
      - "5432:5432"
    volumes:
      - crezo_postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

volumes:
  crezo_postgres_data:
